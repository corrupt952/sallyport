# https://goreleaser.com
version: 2

builds:
  # command.Version is stamped via a full import-path ldflags target (not
  # main.Version) — matches the working scheme already used in flake.nix.
  - ldflags: -s -w -X "github.com/corrupt952/sallyport/command.Version={{.Version}}"
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

# Default archive behavior: bundles LICENSE/README alongside the binary.
